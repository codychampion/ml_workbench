# =============================================================================
# MLOps Workbench - Hydra Configuration
# =============================================================================
# Main configuration file using Hydra for hierarchical config management.
#
# Usage:
#   python -m pipelines.train.finetune                    # Use defaults
#   python -m pipelines.train.finetune experiment=lora    # Override experiment
#   python -m pipelines.train.finetune +experiment=custom # Add new config
#
# Override from CLI:
#   python -m pipelines.train.finetune train.epochs=10 train.batch_size=8
#
# Multi-run:
#   python -m pipelines.train.finetune -m train.learning_rate=1e-3,1e-4,1e-5
# =============================================================================

defaults:
  - _self_
  - infrastructure: default
  - pipeline: train
  - experiment: default
  - override hydra/job_logging: colorlog
  - override hydra/hydra_logging: colorlog

# =============================================================================
# Project Settings
# =============================================================================
project:
  name: mlops-workbench
  version: "1.0.0"
  environment: ${oc.env:MLOPS_ENV,development}
  debug: ${oc.env:DEBUG,false}

# =============================================================================
# Paths
# =============================================================================
paths:
  root: ${oc.env:PROJECT_ROOT,.}
  data:
    raw: ${paths.root}/data/raw
    collected: ${paths.root}/data/collected
    processed: ${paths.root}/data/processed
  outputs: ${paths.root}/outputs
  models: ${paths.root}/models
  logs: ${paths.root}/outputs/logs
  checkpoints: ${paths.root}/outputs/checkpoints

# =============================================================================
# Compute Settings
# =============================================================================
compute:
  device: ${oc.env:COMPUTE_DEVICE,cpu}
  num_workers: ${oc.env:NUM_WORKERS,2}
  seed: 42

# =============================================================================
# Hydra Settings
# =============================================================================
hydra:
  run:
    dir: ${paths.outputs}/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.outputs}/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
  output_subdir: .hydra
