# Infrastructure Configuration
# ============================

# AIM - Experiment Tracking
aim:
  repo: ${oc.env:AIM_REPO,${paths.outputs}/aim}
  server: ${oc.env:AIM_SERVER,null}
  experiment: ${oc.env:AIM_EXPERIMENT,default}
  ui_port: 43800
  tracking_port: 53800
  sync_hydra: true

# S3-Compatible Storage (MinIO locally, AWS/B2 in production)
storage:
  endpoint: ${oc.env:S3_ENDPOINT,http://minio:9000}
  access_key: ${oc.env:S3_ACCESS_KEY,mlops-admin}
  secret_key: ${oc.env:S3_SECRET_KEY,mlops-dev-password}
  region: ${oc.env:S3_REGION,us-east-1}
  buckets:
    data: ${oc.env:S3_BUCKET_DATA,mlops-data}
    models: ${oc.env:S3_BUCKET_MODELS,mlops-models}
    outputs: ${oc.env:S3_BUCKET_OUTPUTS,mlops-outputs}

# FiftyOne - Dataset Visualization
fiftyone:
  dataset_dir: ${paths.root}/data/fiftyone
  port: 5151
  database_uri: ${oc.env:FIFTYONE_DATABASE_URI,mongodb://mongodb:27017/fiftyone}
