# =============================================================================
# Infrastructure Configuration - Default
# =============================================================================
# Configuration for self-hosted MLOps services.
# =============================================================================

# AIM - Experiment Tracking
aim:
  repo: ${oc.env:AIM_REPO,${paths.outputs}/aim}
  server: ${oc.env:AIM_SERVER,null}
  experiment: ${oc.env:AIM_EXPERIMENT,default}
  ui_port: 43800
  tracking_port: 53800
  # Sync with Hydra config
  sync_hydra: true
  log_system_params: true

# S3-Compatible Storage (MinIO locally, B2/AWS in production)
# Switch providers by changing environment variables - no code changes needed
storage:
  # S3 API endpoint
  # - MinIO: http://minio:9000
  # - B2: https://s3.us-west-000.backblazeb2.com
  # - AWS: https://s3.us-east-1.amazonaws.com
  endpoint: ${oc.env:S3_ENDPOINT,http://minio:9000}
  access_key: ${oc.env:S3_ACCESS_KEY,mlops-admin}
  secret_key: ${oc.env:S3_SECRET_KEY,mlops-dev-password}
  region: ${oc.env:S3_REGION,us-east-1}
  secure: ${oc.env:S3_SECURE,false}
  # Default buckets
  buckets:
    data: ${oc.env:S3_BUCKET_DATA,mlops-data}
    models: ${oc.env:S3_BUCKET_MODELS,mlops-models}
    outputs: ${oc.env:S3_BUCKET_OUTPUTS,mlops-outputs}
  # MinIO console (local dev only)
  console_url: ${oc.env:MINIO_CONSOLE_URL,http://localhost:9001}

# HashiCorp Vault - Secrets Management
vault:
  addr: ${oc.env:VAULT_ADDR,http://vault:8200}
  token: ${oc.env:VAULT_TOKEN,null}
  secrets_path: secret/mlops
  enabled: ${oc.env:VAULT_ENABLED,false}

# JuiceFS - Distributed Storage
juicefs:
  mount_point: ${oc.env:JUICEFS_MOUNT,/workspace/jfs}
  metadata_url: ${oc.env:JUICEFS_METADATA,redis://redis:6379/1}
  cache_dir: /tmp/jfs-cache
  cache_size_mb: 10240

# LiteLLM - LLM API Gateway
litellm:
  api_base: ${oc.env:LITELLM_API_BASE,http://litellm:4000}
  api_key: ${oc.env:LITELLM_API_KEY,sk-mlops-dev-key}
  default_model: ${oc.env:LITELLM_DEFAULT_MODEL,ollama/mistral}

# FiftyOne - Dataset Visualization
fiftyone:
  dataset_dir: ${paths.root}/data/fiftyone
  port: 5151
  address: "0.0.0.0"
  database_uri: ${oc.env:FIFTYONE_DATABASE_URI,mongodb://mongodb:27017/fiftyone}

# Knowledge Base - Obsidian + Khoj + Zotero
knowledge:
  # Obsidian vault directory
  vault_dir: ${oc.env:KNOWLEDGE_DIR,${paths.root}/knowledge}
  # Auto-sync settings
  sync:
    enabled: true
    sources:
      - aim
      - zotero
      - fiftyone
      - collections
      - annotations
    interval_seconds: 300  # Sync every 5 minutes if watching
  # Khoj - AI search
  khoj:
    url: ${oc.env:KHOJ_URL,http://localhost:42110}
  # Obsidian CouchDB sync
  couchdb:
    url: ${oc.env:COUCHDB_URL,http://localhost:5984}
    username: ${oc.env:COUCHDB_USER,obsidian}
    password: ${oc.env:COUCHDB_PASSWORD,mlops-dev-password}
    database: obsidian
  # Zotero
  zotero:
    url: ${oc.env:ZOTERO_URL,http://localhost:8085}

# Dataset Manifest System
manifest:
  # Auto-create manifests
  auto_create: true
  # Include git traceability
  git_tracking: true
  # Manifest version
  version: "1.0"
  # ID prefix for collections and annotations
  id_prefix:
    collection: "col-"
    annotation: "ann-"

# Legacy B2 Storage (deprecated - use storage.* settings above)
b2:
  bucket_name: ${oc.env:B2_BUCKET_NAME,mlops-data-bucket}
  local_data_dir: ${paths.data.raw}
