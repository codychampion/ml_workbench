# =============================================================================
# Pipeline Configuration - Data Collection
# =============================================================================

collect:
  source:
    type: reddit        # reddit | url
    subreddit: earthporn
    url: null
    limit: 100
    sort: top           # hot | new | top | rising
    time_filter: week   # hour | day | week | month | year | all

  filter:
    images_only: true
    allowed_extensions: [".jpg", ".jpeg", ".png", ".webp", ".gif"]

  output:
    dir: ${paths.data.collected}
    save_metadata: true
