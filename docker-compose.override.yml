# =============================================================================
# Docker Compose Override - Local Development Customizations
# =============================================================================
# This file is automatically loaded alongside docker-compose.yml
# Use it for local development settings that shouldn't be committed.
#
# For GPU configuration, see: docker-compose.gpu.yml
# =============================================================================

version: '3.8'

services:
  # Development overrides for services
  comfyui:
    # Mount local config for live updates
    volumes:
      - ./services/comfyui:/workspace/comfyui/config:ro
      - ./data/raw:/workspace/comfyui/input:ro

  fiftyone:
    # Mount local data directory
    volumes:
      - ./data:/workspace/data:ro
      - ./outputs:/workspace/outputs:ro

  # Development shell with all volumes mounted
  dev:
    volumes:
      - .:/workspace:cached
      - ~/.gitconfig:/home/mlops/.gitconfig:ro
      # Uncomment to use host's SSH keys
      # - ~/.ssh:/home/mlops/.ssh:ro
