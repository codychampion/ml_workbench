# =============================================================================
# MLOps Workbench - Pipeline-Based Architecture
# =============================================================================
#
# Pipeline Stages:
#   1. collect   - Data gathering (Reddit, gallery-dl)
#   2. annotate  - Auto-captioning & labeling
#   3. train     - Model fine-tuning (LoRA, captioners)
#   4. evaluate  - Benchmarks & metrics
#   5. infer     - Model inference & generation
#
# Infrastructure Services:
#   - MinIO       - S3-compatible object storage (mimics B2/AWS locally)
#   - AIM         - Experiment tracking (replaces W&B)
#   - JuiceFS     - Distributed storage (Redis-backed)
#   - Label Studio - Image/text labeling
#   - CVAT        - Video annotation
#   - Renumics Spotlight - Data exploration
#   - HashiCorp Vault - Secrets management
#   - LiteLLM     - LLM API gateway
#   - FiftyOne    - Dataset visualization
#   - SiYuan      - Knowledge base (Zettelkasten, papers, notes)
#
# Storage Strategy:
#   MinIO provides S3-compatible API locally. To migrate to cloud:
#   - Backblaze B2: Set S3_ENDPOINT=https://s3.us-west-000.backblazeb2.com
#   - AWS S3: Set S3_ENDPOINT=https://s3.us-east-1.amazonaws.com
#   No code changes needed - just update environment variables!
#
# Usage:
#   docker-compose up -d                           # Start services
#   docker-compose run --rm collect <cmd>          # Run collection
#   docker-compose run --rm annotate <cmd>         # Run annotation
#   docker-compose run --rm train <cmd>            # Run training
#   docker-compose run --rm evaluate <cmd>         # Run evaluation
#   docker-compose run --rm infer <cmd>            # Run inference
#
# Web UIs:
#   - MinIO Console: http://localhost:9001
#   - AIM:           http://localhost:43800
#   - Label Studio:  http://localhost:8081
#   - CVAT:          http://localhost:8082
#   - Spotlight:     http://localhost:8083
#   - FiftyOne:      http://localhost:5151
#   - SiYuan:        http://localhost:6806 (code: mlops-dev)
#   - ComfyUI:       http://localhost:8188
#   - Vault:         http://localhost:8200
#   - LiteLLM:       http://localhost:4000
#
# =============================================================================

version: '3.8'

services:

  # ===========================================================================
  # CORE INFRASTRUCTURE
  # ===========================================================================

  # MinIO - S3-compatible object storage (mimics Backblaze B2)
  minio:
    image: minio/minio:latest
    container_name: mlops-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=mlops-admin
      - MINIO_ROOT_PASSWORD=mlops-dev-password
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # MinIO Client - Creates default buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: mlops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 mlops-admin mlops-dev-password;
      mc mb --ignore-existing myminio/mlops-data;
      mc mb --ignore-existing myminio/mlops-models;
      mc mb --ignore-existing myminio/mlops-outputs;
      mc anonymous set download myminio/mlops-outputs;
      echo 'MinIO buckets initialized successfully';
      "
    networks:
      - mlops-network
    restart: "no"

  # MongoDB - Database for FiftyOne and metadata
  mongodb:
    image: mongo:7.0
    container_name: mlops-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=fiftyone
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis - Backend for JuiceFS and caching
  redis:
    image: redis:7-alpine
    container_name: mlops-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL - Backend for CVAT and Vault
  postgres:
    image: postgres:15-alpine
    container_name: mlops-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_USER=mlops
      - POSTGRES_PASSWORD=mlops_dev_password
      - POSTGRES_MULTIPLE_DATABASES=cvat,vault
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # EXPERIMENT TRACKING - AIM (replaces W&B)
  # ===========================================================================

  aim:
    image: aimstack/aim:latest
    container_name: mlops-aim
    restart: unless-stopped
    ports:
      - "43800:43800"  # AIM UI
      - "53800:53800"  # AIM tracking server
    volumes:
      - aim-data:/aim
      - ./outputs:/outputs:ro
    environment:
      - AIM_UI_BASE_PATH=/
    command: up --host 0.0.0.0 --port 43800
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:43800"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ===========================================================================
  # DISTRIBUTED STORAGE - JuiceFS
  # ===========================================================================

  juicefs-format:
    image: juicedata/juicefs:latest
    container_name: mlops-juicefs-format
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - juicefs-data:/jfs
    command: >
      format
      --storage file
      --bucket /jfs
      redis://redis:6379/1
      mlops-data
    networks:
      - mlops-network
    restart: "no"

  juicefs-mount:
    image: juicedata/juicefs:latest
    container_name: mlops-juicefs
    restart: unless-stopped
    depends_on:
      juicefs-format:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    privileged: true
    volumes:
      - juicefs-data:/jfs
      - juicefs-mount:/mnt/jfs:shared
    command: >
      mount
      --background=false
      --cache-dir=/jfs/cache
      --cache-size=10240
      redis://redis:6379/1
      /mnt/jfs
    healthcheck:
      test: ["CMD", "ls", "/mnt/jfs"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # DATA LABELING - Label Studio (Images/Text)
  # ===========================================================================

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: mlops-label-studio
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - label-studio-data:/label-studio/data
      - ./data:/label-studio/files:ro
      - juicefs-mount:/label-studio/jfs:ro
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ===========================================================================
  # VIDEO ANNOTATION - CVAT (Computer Vision Annotation Tool)
  # ===========================================================================

  cvat-server:
    image: cvat/server:v2.9.1
    container_name: mlops-cvat-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cvat-data:/home/django/data
      - cvat-share:/home/django/share
      - ./data:/home/django/files:ro
      - juicefs-mount:/home/django/jfs:ro
    environment:
      - DJANGO_MODWSGI_EXTRA_ARGS=
      - ALLOWED_HOSTS=*
      - CVAT_REDIS_HOST=redis
      - CVAT_POSTGRES_HOST=postgres
      - CVAT_POSTGRES_USER=mlops
      - CVAT_POSTGRES_PASSWORD=mlops_dev_password
      - CVAT_POSTGRES_DBNAME=cvat
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  cvat-worker-import:
    image: cvat/server:v2.9.1
    container_name: mlops-cvat-worker-import
    restart: unless-stopped
    depends_on:
      - cvat-server
    command: /home/django/wait-for-it.sh cvat-server:8080 -t 0 -- python3 ~/manage.py rqworker -v 3 import
    volumes:
      - cvat-data:/home/django/data
      - cvat-share:/home/django/share
    environment:
      - CVAT_REDIS_HOST=redis
      - CVAT_POSTGRES_HOST=postgres
      - CVAT_POSTGRES_USER=mlops
      - CVAT_POSTGRES_PASSWORD=mlops_dev_password
      - CVAT_POSTGRES_DBNAME=cvat
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  cvat-worker-export:
    image: cvat/server:v2.9.1
    container_name: mlops-cvat-worker-export
    restart: unless-stopped
    depends_on:
      - cvat-server
    command: /home/django/wait-for-it.sh cvat-server:8080 -t 0 -- python3 ~/manage.py rqworker -v 3 export
    volumes:
      - cvat-data:/home/django/data
      - cvat-share:/home/django/share
    environment:
      - CVAT_REDIS_HOST=redis
      - CVAT_POSTGRES_HOST=postgres
      - CVAT_POSTGRES_USER=mlops
      - CVAT_POSTGRES_PASSWORD=mlops_dev_password
      - CVAT_POSTGRES_DBNAME=cvat
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  cvat-ui:
    image: cvat/ui:v2.9.1
    container_name: mlops-cvat-ui
    restart: unless-stopped
    depends_on:
      - cvat-server
    ports:
      - "8082:80"
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ===========================================================================
  # DATA EXPLORATION - Renumics Spotlight
  # ===========================================================================

  spotlight:
    build:
      context: .
      dockerfile: services/spotlight/Dockerfile
    image: mlops-spotlight:latest
    container_name: mlops-spotlight
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8083:8000"
    volumes:
      - ./data:/workspace/data:ro
      - ./outputs:/workspace/outputs:ro
      - juicefs-mount:/workspace/jfs:ro
    environment:
      - SPOTLIGHT_HOST=0.0.0.0
      - SPOTLIGHT_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # SECRETS MANAGEMENT - HashiCorp Vault
  # ===========================================================================

  vault:
    image: hashicorp/vault:1.15
    container_name: mlops-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/data
      - ./docker/vault/config:/vault/config:ro
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=mlops-dev-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    command: server -dev -dev-root-token-id=mlops-dev-token
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ===========================================================================
  # LLM API GATEWAY - LiteLLM
  # ===========================================================================

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: mlops-litellm
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./docker/litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=sk-mlops-dev-key
      - DATABASE_URL=postgresql://mlops:mlops_dev_password@postgres:5432/litellm
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
    command: --config /app/config.yaml --port 4000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # KNOWLEDGE BASE - SiYuan (Zettelkasten-style notes)
  # ===========================================================================
  # Self-hosted note-taking for research papers, experiment notes, and docs.
  # Supports Markdown, backlinks, graph view, and S3 sync.

  siyuan:
    image: b3log/siyuan:latest
    container_name: mlops-siyuan
    restart: unless-stopped
    ports:
      - "6806:6806"
    volumes:
      - siyuan-data:/siyuan/workspace
      - ./outputs:/siyuan/workspace/data/assets/outputs:ro
      - ./data:/siyuan/workspace/data/assets/data:ro
    environment:
      - SIYUAN_ACCESS_AUTH_CODE=mlops-dev
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6806/api/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===========================================================================
  # DATASET VISUALIZATION - FiftyOne
  # ===========================================================================

  fiftyone:
    build:
      context: .
      dockerfile: services/fiftyone/Dockerfile
    image: mlops-fiftyone:latest
    container_name: mlops-fiftyone
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5151:5151"
    volumes:
      - fiftyone-data:/workspace/fiftyone/datasets
      - ./data:/workspace/data:ro
      - juicefs-mount:/workspace/jfs:ro
    environment:
      - FIFTYONE_APP_ADDRESS=0.0.0.0
      - FIFTYONE_APP_PORT=5151
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5151"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # COMFYUI - Image Generation Workflows
  # ===========================================================================

  comfyui:
    build:
      context: .
      dockerfile: services/comfyui/Dockerfile
    image: mlops-comfyui:latest
    container_name: mlops-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/workspace/comfyui/models
      - comfyui-output:/workspace/comfyui/output
      - ./models:/workspace/models:ro
      - juicefs-mount:/workspace/jfs:ro
    environment:
      - COMFYUI_HOST=0.0.0.0
      - COMFYUI_PORT=8188
      - COMPUTE_DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # PIPELINE STAGES (run with: docker-compose run --rm <stage> <command>)
  # ===========================================================================

  # Stage 1: Data Collection (lightweight, no ML deps)
  collect:
    build:
      context: .
      dockerfile: pipelines/collect/Dockerfile
    image: mlops-collect:latest
    depends_on:
      juicefs-mount:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/workspace:cached
      - ./data/raw:/workspace/data/raw
      - ./data/collected:/workspace/data/collected
      - juicefs-mount:/workspace/jfs
    environment:
      - COMPUTE_DEVICE=cpu
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      # S3-compatible storage (MinIO locally, B2/S3 in production)
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=mlops-admin
      - S3_SECRET_KEY=mlops-dev-password
      - S3_BUCKET=mlops-data
      - S3_REGION=us-east-1
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Stage 2: Data Annotation (auto-captioning, uses trained models)
  annotate:
    build:
      context: .
      dockerfile: pipelines/annotate/Dockerfile
    image: mlops-annotate:latest
    depends_on:
      - mongodb
      - aim
      - minio
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
      - juicefs-mount:/workspace/jfs
    environment:
      - COMPUTE_DEVICE=cpu
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
      - AIM_REPO=/workspace/outputs/aim
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=mlops-admin
      - S3_SECRET_KEY=mlops-dev-password
      - S3_BUCKET=mlops-data
      - S3_REGION=us-east-1
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Stage 3: Model Training (fine-tuning, LoRA)
  train:
    build:
      context: .
      dockerfile: pipelines/train/Dockerfile
    image: mlops-train:latest
    depends_on:
      - aim
      - minio
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - huggingface-cache:/workspace/.cache/huggingface
      - juicefs-mount:/workspace/jfs
    environment:
      - COMPUTE_DEVICE=cpu
      - AIM_REPO=/workspace/outputs/aim
      - AIM_SERVER=http://aim:53800
      - HF_HOME=/workspace/.cache/huggingface
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      - LITELLM_API_BASE=http://litellm:4000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=mlops-admin
      - S3_SECRET_KEY=mlops-dev-password
      - S3_BUCKET=mlops-models
      - S3_REGION=us-east-1
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G

  # Stage 4: Model Evaluation (benchmarks, metrics)
  evaluate:
    build:
      context: .
      dockerfile: pipelines/evaluate/Dockerfile
    image: mlops-evaluate:latest
    depends_on:
      - aim
      - mongodb
      - minio
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
      - juicefs-mount:/workspace/jfs
    environment:
      - COMPUTE_DEVICE=cpu
      - AIM_REPO=/workspace/outputs/aim
      - AIM_SERVER=http://aim:53800
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=mlops-admin
      - S3_SECRET_KEY=mlops-dev-password
      - S3_BUCKET=mlops-outputs
      - S3_REGION=us-east-1
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Stage 5: Model Inference (generation, prediction)
  infer:
    build:
      context: .
      dockerfile: pipelines/infer/Dockerfile
    image: mlops-infer:latest
    depends_on:
      - aim
      - mongodb
      - minio
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
      - juicefs-mount:/workspace/jfs
    environment:
      - COMPUTE_DEVICE=cpu
      - AIM_REPO=/workspace/outputs/aim
      - AIM_SERVER=http://aim:53800
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      - LITELLM_API_BASE=http://litellm:4000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=mlops-admin
      - S3_SECRET_KEY=mlops-dev-password
      - S3_BUCKET=mlops-outputs
      - S3_REGION=us-east-1
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # ===========================================================================
  # DEV SHELL (interactive development)
  # ===========================================================================

  dev:
    build:
      context: .
      dockerfile: docker/base/Dockerfile.diffusers
    image: mlops-dev:latest
    container_name: mlops-dev
    depends_on:
      - aim
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
      - juicefs-mount:/workspace/jfs
    environment:
      - MLOPS_ENV=development
      - DEBUG=true
      - AIM_REPO=/workspace/outputs/aim
      - AIM_SERVER=http://aim:53800
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
      - COMPUTE_DEVICE=cpu
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=mlops-dev-token
      - LITELLM_API_BASE=http://litellm:4000
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true
    networks:
      - mlops-network
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

