# =============================================================================
# MLOps Workbench - Pipeline-Based Architecture
# =============================================================================
#
# Pipeline Stages:
#   1. collect   - Data gathering (Reddit, gallery-dl)
#   2. annotate  - Auto-captioning & labeling
#   3. train     - Model fine-tuning (LoRA, captioners)
#   4. evaluate  - Benchmarks & metrics
#   5. infer     - Model inference & generation
#
# Usage:
#   docker-compose up -d                           # Start services
#   docker-compose run --rm collect <cmd>          # Run collection
#   docker-compose run --rm annotate <cmd>         # Run annotation
#   docker-compose run --rm train <cmd>            # Run training
#   docker-compose run --rm evaluate <cmd>         # Run evaluation
#   docker-compose run --rm infer <cmd>            # Run inference
#
# =============================================================================

version: '3.8'

services:

  # ===========================================================================
  # INFRASTRUCTURE SERVICES (always running)
  # ===========================================================================

  mongodb:
    image: mongo:7.0
    container_name: mlops-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=fiftyone
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  wandb-server:
    image: wandb/local:latest
    container_name: mlops-wandb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - wandb-data:/vol/wandb
    environment:
      - LOCAL_RESTORE=true
      - GORILLA_ALLOW_USER_REGISTRATION=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: mlops-label-studio
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - label-studio-data:/label-studio/data
      - ./data:/label-studio/files:ro
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  fiftyone:
    build:
      context: .
      dockerfile: services/fiftyone/Dockerfile
    image: mlops-fiftyone:latest
    container_name: mlops-fiftyone
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5151:5151"
    volumes:
      - fiftyone-data:/workspace/fiftyone/datasets
      - ./data:/workspace/data:ro
    environment:
      - FIFTYONE_APP_ADDRESS=0.0.0.0
      - FIFTYONE_APP_PORT=5151
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5151"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  comfyui:
    build:
      context: .
      dockerfile: services/comfyui/Dockerfile
    image: mlops-comfyui:latest
    container_name: mlops-comfyui
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/workspace/comfyui/models
      - comfyui-output:/workspace/comfyui/output
      - ./models:/workspace/models:ro
    environment:
      - COMFYUI_HOST=0.0.0.0
      - COMFYUI_PORT=8188
      - COMPUTE_DEVICE=cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # ===========================================================================
  # PIPELINE STAGES (run with: docker-compose run --rm <stage> <command>)
  # ===========================================================================

  # Stage 1: Data Collection (lightweight, no ML deps)
  collect:
    build:
      context: .
      dockerfile: pipelines/collect/Dockerfile
    image: mlops-collect:latest
    volumes:
      - .:/workspace:cached
      - ./data/raw:/workspace/data/raw
      - ./data/collected:/workspace/data/collected
    environment:
      - COMPUTE_DEVICE=cpu
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Stage 2: Data Annotation (auto-captioning, uses trained models)
  annotate:
    build:
      context: .
      dockerfile: pipelines/annotate/Dockerfile
    image: mlops-annotate:latest
    depends_on:
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
    environment:
      - COMPUTE_DEVICE=cpu
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Stage 3: Model Training (fine-tuning, LoRA)
  train:
    build:
      context: .
      dockerfile: pipelines/train/Dockerfile
    image: mlops-train:latest
    depends_on:
      - wandb-server
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - huggingface-cache:/workspace/.cache/huggingface
    environment:
      - COMPUTE_DEVICE=cpu
      - WANDB_BASE_URL=http://wandb-server:8080
      - HF_HOME=/workspace/.cache/huggingface
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G

  # Stage 4: Model Evaluation (benchmarks, metrics)
  evaluate:
    build:
      context: .
      dockerfile: pipelines/evaluate/Dockerfile
    image: mlops-evaluate:latest
    depends_on:
      - wandb-server
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
    environment:
      - COMPUTE_DEVICE=cpu
      - WANDB_BASE_URL=http://wandb-server:8080
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # Stage 5: Model Inference (generation, prediction)
  infer:
    build:
      context: .
      dockerfile: pipelines/infer/Dockerfile
    image: mlops-infer:latest
    depends_on:
      - wandb-server
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - ./outputs:/workspace/outputs
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
    environment:
      - COMPUTE_DEVICE=cpu
      - WANDB_BASE_URL=http://wandb-server:8080
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
    networks:
      - mlops-network
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # ===========================================================================
  # DEV SHELL (interactive development)
  # ===========================================================================

  dev:
    build:
      context: .
      dockerfile: docker/base/Dockerfile.diffusers
    image: mlops-dev:latest
    container_name: mlops-dev
    depends_on:
      - wandb-server
      - mongodb
    volumes:
      - .:/workspace:cached
      - ./data:/workspace/data
      - ./models:/workspace/models
      - fiftyone-data:/workspace/fiftyone
      - huggingface-cache:/workspace/.cache/huggingface
    environment:
      - MLOPS_ENV=development
      - DEBUG=true
      - WANDB_BASE_URL=http://wandb-server:8080
      - FIFTYONE_DATABASE_URI=mongodb://mongodb:27017/fiftyone
      - HF_HOME=/workspace/.cache/huggingface
      - COMPUTE_DEVICE=cpu
    ports:
      - "8888:8888"
    stdin_open: true
    tty: true
    networks:
      - mlops-network
    profiles:
      - dev
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  mongodb-data:
  wandb-data:
  label-studio-data:
  fiftyone-data:
  comfyui-models:
  comfyui-output:
  huggingface-cache:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  mlops-network:
    driver: bridge
