# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  # Service data
  comfyui-models:
    driver: local
  comfyui-output:
    driver: local
  comfyui-input:
    driver: local
  fiftyone-data:
    driver: local
  fiftyone-db:
    driver: local
  wandb-runs:
    driver: local
  wandb-artifacts:
    driver: local

  # Worker outputs
  flux-output:
    driver: local
  adv-output:
    driver: local
  lora-checkpoints:
    driver: local
  lora-data:
    driver: local

  # PHASE 2/3 TODO:
  # prefect-data:
  #   driver: local
  # redis-data:
  #   driver: local

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  mlops-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

