# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  comfyui-models:
  comfyui-output:
  comfyui-input:
  fiftyone-data:
  fiftyone-db:
  wandb-runs:
  wandb-artifacts:
  flux-output:
  adv-output:
  lora-checkpoints:
  lora-data:

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  mlops-network:
    driver: bridge
