# MLOps Workbench - Lean Profile-Based Architecture
#
# Default (MinIO only): docker compose up -d
# Profiles:
#   llm:      docker compose --profile llm up -d
#   chat:     docker compose --profile chat up -d
#   comfyui:  docker compose --profile comfyui up -d
#   labeling: docker compose --profile labeling up -d
#   tracking: docker compose --profile tracking up -d
#   registry: docker compose --profile registry up -d
#   pipeline: docker compose --profile pipeline run --rm train <cmd>
#   test:     docker compose --profile test run --rm test

services:
  # === CORE (always on) ===
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: mlops-minio
    restart: unless-stopped
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mlops-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mlops-dev-password}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [mlops-network]

  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    depends_on: {minio: {condition: service_healthy}}
    entrypoint: /bin/sh -c "mc alias set m http://minio:9000 $${S3_ACCESS_KEY:-mlops-admin} $${S3_SECRET_KEY:-mlops-dev-password} && mc mb --ignore-existing m/mlops-data m/mlops-models m/mlops-outputs"
    networks: [mlops-network]
    restart: "no"

  # === LLM PROFILE ===
  llm:
    image: vllm/vllm-openai:latest
    profiles: [llm]
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - ./models:/models
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY:-ml-workbench-key}
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    command: >
      --model ${LLM_MODEL:-meta-llama/Llama-3.1-70B-Instruct}
      --tensor-parallel-size 1
      --max-model-len ${MAX_CONTEXT:-8192}
      --gpu-memory-utilization ${GPU_MEM_UTIL:-0.9}
      --dtype auto
      --api-key ${VLLM_API_KEY:-ml-workbench-key}
      --served-model-name llm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks: [mlops-network]

  llm-fast:
    image: vllm/vllm-openai:latest
    profiles: [llm-multi]
    restart: unless-stopped
    ports: ["8001:8000"]
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY:-ml-workbench-key}
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    command: >
      --model Qwen/Qwen2.5-32B-Instruct
      --max-model-len 32768
      --gpu-memory-utilization 0.4
      --dtype auto
      --api-key ${VLLM_API_KEY:-ml-workbench-key}
      --served-model-name llm-fast
    networks: [mlops-network]

  llm-vision:
    image: vllm/vllm-openai:latest
    profiles: [llm-vision]
    restart: unless-stopped
    ports: ["8002:8000"]
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      HF_HOME: /root/.cache/huggingface
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_API_KEY: ${VLLM_API_KEY:-ml-workbench-key}
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    command: >
      --model Qwen/Qwen2-VL-7B-Instruct
      --max-model-len 4096
      --gpu-memory-utilization 0.25
      --dtype auto
      --api-key ${VLLM_API_KEY:-ml-workbench-key}
      --served-model-name llm-vision
    networks: [mlops-network]


  # === CHAT PROFILE ===
  postgres:
    image: pgvector/pgvector:pg15
    profiles: [chat]
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multi.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops_dev_password}
      POSTGRES_DB: khoj
      POSTGRES_MULTIPLE_DATABASES: khoj,mlops
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U mlops"], interval: 10s, timeout: 5s, retries: 5}
    networks: [mlops-network]

  khoj:
    image: ghcr.io/khoj-ai/khoj:latest
    profiles: [chat]
    restart: unless-stopped
    depends_on: {postgres: {condition: service_healthy}}
    ports: ["42110:42110"]
    volumes:
      - khoj-data:/root/.khoj
      - ./knowledge:/data/knowledge
      - ./:/data/repo:ro
      - ./outputs:/data/outputs:ro
    environment:
      KHOJ_ADMIN_EMAIL: ${KHOJ_ADMIN_EMAIL:-admin@mlops.local}
      KHOJ_ADMIN_PASSWORD: ${KHOJ_ADMIN_PASSWORD:-mlops-dev-password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops_dev_password}
      POSTGRES_DB: khoj
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Offline-friendly defaults to avoid blocking startup when huggingface is unreachable
      HF_HUB_OFFLINE: "0"
      DISABLE_MODEL_DOWNLOADS: "0"
      ANONYMOUS_MODE: "true"
      GITHUB_TOKEN: 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
    networks: [mlops-network]

  # === LABELING PROFILE ===
  label-studio:
    image: heartexlabs/label-studio:1.11.0
    profiles: [labeling]
    restart: unless-stopped
    depends_on: {minio: {condition: service_healthy}}
    ports: ["8081:8080"]
    volumes: [label-studio-data:/label-studio/data, ./data:/label-studio/files:ro]
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/files
      LABEL_STUDIO_USERNAME: ${LABEL_STUDIO_USERNAME:-admin}
      LABEL_STUDIO_PASSWORD: ${LABEL_STUDIO_PASSWORD:-mlops-dev-password}
      LABEL_STUDIO_EMAIL: ${LABEL_STUDIO_EMAIL:-admin@mlops.local}
      LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_EMAIL_VERIFICATION: "true"
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-mlops-admin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-mlops-dev-password}
      AWS_S3_ENDPOINT: http://minio:9000
    networks: [mlops-network]

  # === COMFYUI PROFILE ===
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    profiles: [comfyui]
    restart: unless-stopped
    ports: ["8188:8188"]
    volumes:
      - comfyui-data:/workspace
      - ./models:/workspace/ComfyUI/models:rw
      - ./outputs:/workspace/ComfyUI/output:rw
      - ./data:/workspace/ComfyUI/input:ro
    environment:
      WEB_ENABLE_AUTH: "false"
      WORKSPACE: /workspace
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    networks: [mlops-network]

  # === TRACKING PROFILE ===
  aim:
    image: aimstack/aim:3.19.3
    profiles: [tracking]
    restart: unless-stopped
    ports: ["43800:43800", "53800:53800"]
    volumes: [aim-data:/aim, ./outputs:/outputs:ro]
    command: up --host 0.0.0.0 --port 43800
    networks: [mlops-network]

  # === REGISTRY PROFILE ===
  registry:
    image: registry:2
    profiles: [registry]
    restart: unless-stopped
    ports: ["5000:5000"]
    volumes: [registry-data:/var/lib/registry]
    networks: [mlops-network]

  # === PIPELINE PROFILE ===
  collect:
    build: {context: ., dockerfile: pipelines/collect/Dockerfile}
    profiles: [pipeline]
    depends_on: {minio: {condition: service_healthy}}
    volumes: [.:/workspace:cached, ./data/raw:/workspace/data/raw, ./data/collected:/workspace/data/collected]
    environment: &pipeline_env
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-mlops-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-mlops-dev-password}
      S3_BUCKET: mlops-data
      HF_HOME: /workspace/.cache/huggingface
      AIM_REPO: /workspace/outputs/aim
    networks: [mlops-network]

  train:
    build: {context: ., dockerfile: pipelines/train/Dockerfile}
    profiles: [pipeline]
    depends_on: {minio: {condition: service_healthy}}
    volumes: [.:/workspace:cached, ./data:/workspace/data, ./models:/workspace/models, ./outputs:/workspace/outputs, huggingface-cache:/workspace/.cache/huggingface]
    environment:
      <<: *pipeline_env
      S3_BUCKET: mlops-models
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    networks: [mlops-network]

  evaluate:
    build: {context: ., dockerfile: pipelines/evaluate/Dockerfile}
    profiles: [pipeline]
    depends_on: {minio: {condition: service_healthy}}
    volumes: [.:/workspace:cached, ./data:/workspace/data, ./models:/workspace/models, ./outputs:/workspace/outputs, huggingface-cache:/workspace/.cache/huggingface]
    environment:
      <<: *pipeline_env
      S3_BUCKET: mlops-outputs
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    networks: [mlops-network]

  infer:
    build: {context: ., dockerfile: pipelines/infer/Dockerfile}
    profiles: [pipeline]
    depends_on: {minio: {condition: service_healthy}}
    volumes: [.:/workspace:cached, ./data:/workspace/data, ./models:/workspace/models, ./outputs:/workspace/outputs, huggingface-cache:/workspace/.cache/huggingface]
    environment:
      <<: *pipeline_env
      S3_BUCKET: mlops-outputs
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]
    networks: [mlops-network]

  # === TEST PROFILE ===
  test:
    build: {context: ., dockerfile: tests/docker/Dockerfile}
    profiles: [test]
    depends_on: {minio: {condition: service_healthy}}
    volumes: [./tests:/workspace/tests:ro, ./pytest.ini:/workspace/pytest.ini:ro]
    environment:
      MINIO_HOST: minio
      TEST_MODE: ${TEST_MODE:-full}
    networks: [mlops-network]

volumes:
  minio-data:
  postgres-data:
  aim-data:
  label-studio-data:
  comfyui-data:
  huggingface-cache:
  khoj-data:
  registry-data:

networks:
  mlops-network:
