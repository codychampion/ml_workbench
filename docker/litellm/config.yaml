# =============================================================================
# LiteLLM Configuration - LLM API Gateway
# =============================================================================
# Unified API gateway for multiple LLM providers with:
#   - OpenAI-compatible API
#   - Rate limiting and load balancing
#   - Cost tracking
#   - Fallback routing
#
# Access: http://localhost:4000
# API Key: sk-mlops-dev-key (for development)
# =============================================================================

model_list:
  # -------------------------------------------------------------------------
  # Local/Self-hosted Models (no API keys required)
  # -------------------------------------------------------------------------

  # Ollama (if running locally)
  - model_name: ollama/llama2
    litellm_params:
      model: ollama/llama2
      api_base: http://host.docker.internal:11434
    model_info:
      description: "Llama 2 via Ollama (local)"

  - model_name: ollama/codellama
    litellm_params:
      model: ollama/codellama
      api_base: http://host.docker.internal:11434
    model_info:
      description: "Code Llama via Ollama (local)"

  - model_name: ollama/mistral
    litellm_params:
      model: ollama/mistral
      api_base: http://host.docker.internal:11434
    model_info:
      description: "Mistral 7B via Ollama (local)"

  # -------------------------------------------------------------------------
  # Cloud Providers (requires API keys in Vault)
  # -------------------------------------------------------------------------
  # Uncomment and configure when API keys are available

  # OpenAI
  # - model_name: gpt-4
  #   litellm_params:
  #     model: gpt-4
  #     api_key: os.environ/OPENAI_API_KEY

  # - model_name: gpt-3.5-turbo
  #   litellm_params:
  #     model: gpt-3.5-turbo
  #     api_key: os.environ/OPENAI_API_KEY

  # Anthropic
  # - model_name: claude-3-opus
  #   litellm_params:
  #     model: claude-3-opus-20240229
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # - model_name: claude-3-sonnet
  #   litellm_params:
  #     model: claude-3-sonnet-20240229
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # -------------------------------------------------------------------------
  # Hugging Face Inference (local or API)
  # -------------------------------------------------------------------------

  - model_name: huggingface/text-generation
    litellm_params:
      model: huggingface/bigscience/bloom-560m
      api_base: http://host.docker.internal:8080
    model_info:
      description: "HuggingFace text generation (local inference)"

# =============================================================================
# General Settings
# =============================================================================

general_settings:
  master_key: sk-mlops-dev-key

  # Database for tracking (optional)
  # database_url: postgresql://mlops:mlops_dev_password@postgres:5432/litellm

  # Alerting (optional)
  # alerting:
  #   - slack

  # Callbacks for logging
  callbacks:
    - aim  # Log to AIM for experiment tracking

# =============================================================================
# Router Settings
# =============================================================================

router_settings:
  # Routing strategy: simple, least-busy, latency-based, cost-based
  routing_strategy: simple

  # Number of retries on failure
  num_retries: 2

  # Timeout in seconds
  timeout: 120

  # Enable fallbacks
  enable_fallbacks: true

  # Fallback models (in order of preference)
  fallbacks:
    - model_name: ollama/mistral
    - model_name: ollama/llama2

# =============================================================================
# Litellm Module Settings
# =============================================================================

litellm_settings:
  # Drop unsupported params instead of raising errors
  drop_params: true

  # Set default temperature
  # default_temperature: 0.7

  # Enable caching (Redis)
  # cache: true
  # cache_params:
  #   type: redis
  #   host: redis
  #   port: 6379
