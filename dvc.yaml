# =============================================================================
# DVC Pipeline - MLOps Workbench
# =============================================================================
#
# Pipeline Stages:
#   1. collect   -> data/collected/
#   2. annotate  -> data/annotated/
#   3. train     -> models/
#   4. evaluate  -> outputs/metrics/
#   5. infer     -> outputs/
#
# Run: dvc repro <stage>
# =============================================================================

stages:

  # ===========================================================================
  # STAGE 1: Data Collection
  # ===========================================================================
  collect:
    cmd: >
      python -m pipelines.collect.collect
      --subreddit ${collect.subreddit}
      --limit ${collect.limit}
      --sort ${collect.sort}
      --time ${collect.time}
      --output-dir data/collected/${collect.subreddit}
    params:
      - collect
    outs:
      - data/collected/${collect.subreddit}:
          cache: true
          persist: true

  # ===========================================================================
  # STAGE 2: Data Annotation (Auto-Captioning)
  # ===========================================================================
  annotate:
    cmd: >
      python -m pipelines.annotate.caption
      --input-dir data/collected/${collect.subreddit}
      --model ${annotate.model}
      --output-format ${annotate.output_format}
      --recursive
    deps:
      - data/collected/${collect.subreddit}
      - pipelines/annotate/caption.py
    params:
      - annotate

  annotate-custom:
    cmd: >
      python -m pipelines.annotate.caption
      --input-dir data/collected/${collect.subreddit}
      --model models/captioner/${train.captioner.output_name}
      --output-format txt
      --recursive
    deps:
      - data/collected/${collect.subreddit}
      - models/captioner/${train.captioner.output_name}
      - pipelines/annotate/caption.py

  create-dataset:
    cmd: >
      python -m pipelines.annotate.create_dataset
      --input-dir data/collected/${collect.subreddit}
      --name ${dataset.name}
    deps:
      - data/collected/${collect.subreddit}
      - pipelines/annotate/create_dataset.py
    params:
      - dataset.name

  # ===========================================================================
  # STAGE 3: Model Training
  # ===========================================================================
  train-captioner:
    cmd: >
      python -m pipelines.train.finetune
      --dataset data/annotated
      --model ${train.captioner.base_model}
      --output models/captioner/${train.captioner.output_name}
      --epochs ${train.captioner.epochs}
      --batch-size ${train.captioner.batch_size}
      --learning-rate ${train.captioner.learning_rate}
      --lora-rank ${train.captioner.lora_rank}
    deps:
      - data/annotated
      - pipelines/train/finetune.py
    params:
      - train.captioner
    outs:
      - models/captioner/${train.captioner.output_name}:
          cache: true

  train-lora:
    cmd: >
      python -m pipelines.train.train_lora
      --dataset data/annotated
      --base-model ${train.lora.base_model}
      --output models/lora/${train.lora.output_name}
      --epochs ${train.lora.epochs}
      --batch-size ${train.lora.batch_size}
      --learning-rate ${train.lora.learning_rate}
      --rank ${train.lora.rank}
    deps:
      - data/annotated
      - pipelines/train/train_lora.py
    params:
      - train.lora
    outs:
      - models/lora/${train.lora.output_name}:
          cache: true

  # ===========================================================================
  # STAGE 4: Model Evaluation
  # ===========================================================================
  benchmark-captioner:
    cmd: >
      python -m pipelines.evaluate.benchmark
      --model ${evaluate.captioner.model}
      --benchmark captioning
      --output outputs/benchmarks
      --num-runs ${evaluate.captioner.num_runs}
    deps:
      - pipelines/evaluate/benchmark.py
    params:
      - evaluate.captioner
    outs:
      - outputs/benchmarks:
          cache: false
          persist: true

  evaluate-metrics:
    cmd: >
      python -m pipelines.evaluate.metrics
      --predictions outputs/predictions.json
      --references data/test/references.json
      --task ${evaluate.task}
      --output outputs/metrics
      --model-name ${evaluate.model_name}
    deps:
      - outputs/predictions.json
      - data/test/references.json
      - pipelines/evaluate/metrics.py
    params:
      - evaluate.task
      - evaluate.model_name
    outs:
      - outputs/metrics:
          cache: false
          persist: true

  # ===========================================================================
  # STAGE 5: Model Inference
  # ===========================================================================
  generate:
    cmd: >
      python -m pipelines.infer.run_generation
      --model ${infer.model}
      --lora ${infer.lora_path}
      --prompt "${infer.prompt}"
      --output outputs/generations
    deps:
      - pipelines/infer/run_generation.py
    params:
      - infer
    outs:
      - outputs/generations:
          cache: false
          persist: true
