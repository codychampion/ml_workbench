{
    "extractor": {
        "base-directory": "./data/collected/",
        "archive": "./data/.gallery-dl-archive",

        "reddit": {
            "comments": 0,
            "morecomments": false,
            "recursion": 0,
            "videos": true,
            "user-agent": "gallery-dl/1.0",
            "date-min": "1970-01-01",
            "date-max": "2100-01-01"
        },

        "imgur": {
            "mp4": true
        },

        "twitter": {
            "cards": false,
            "conversations": false,
            "replies": false,
            "retweets": false,
            "videos": true
        }
    },

    "downloader": {
        "part": true,
        "part-directory": "/tmp/.gallery-dl/",
        "rate": null,
        "retries": 4,
        "timeout": 30.0,
        "verify": true,

        "http": {
            "adjust-extensions": true
        },

        "ytdl": {
            "enabled": true,
            "format": "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best",
            "module": "yt_dlp",
            "logging": true
        }
    },

    "output": {
        "mode": "auto",
        "progress": true,
        "shorten": "eaw",
        "ansi": true,

        "log": {
            "level": "info",
            "format": "[{name}] {message}"
        },

        "logfile": {
            "path": "./data/.gallery-dl.log",
            "mode": "a",
            "level": "debug"
        }
    },

    "postprocessor": {}
}
