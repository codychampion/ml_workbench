# ComfyUI Service Configuration
# ==============================
# Phase 1: Mock server configuration
# Phase 2/3: Full ComfyUI configuration

service:
  name: comfyui
  version: "1.0.0"
  phase: "1-local-core"

server:
  host: "0.0.0.0"
  port: 8188

paths:
  output: /workspace/comfyui/output
  input: /workspace/comfyui/input
  models: /workspace/comfyui/models
  custom_nodes: /workspace/comfyui/custom_nodes

