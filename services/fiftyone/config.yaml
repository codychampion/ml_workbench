# FiftyOne Service Configuration
# ===============================

service:
  name: fiftyone
  version: "1.0.0"
  description: "ML data visualization and exploration"

server:
  address: "0.0.0.0"
  port: 5151

paths:
  database: /workspace/fiftyone/database
  datasets: /workspace/fiftyone/datasets
  cache: /workspace/fiftyone/cache

settings:
  # Automatically load quickstart dataset on startup
  auto_load_quickstart: true

  # Default samples to load for quickstart
  quickstart_max_samples: 50

