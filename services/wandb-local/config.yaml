# W&B Local Service Configuration
# ================================

service:
  name: wandb-local
  version: "1.0.0"
  description: "Local W&B experiment tracking utilities"

server:
  host: "0.0.0.0"
  port: 8080

paths:
  runs: /workspace/wandb/runs
  artifacts: /workspace/wandb/artifacts
  cache: /workspace/wandb/cache

# Phase 1: Offline mode settings
phase1:
  mode: offline
  sync_on_demand: true

